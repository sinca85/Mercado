    function StrategyPage({ initialId, onStrategyNameChange, onSimulationEnabledChange }) {
      const [id, setId] = useState(initialId);
      const [loading, setLoading] = useState(Boolean(initialId));
      const [saving, setSaving] = useState(false);
      const [autoSaving, setAutoSaving] = useState(false);
      const [payload, setPayload] = useState(null);
      const [focusedHistoryTarget, setFocusedHistoryTarget] = useState({ type: 'CALL', index: 0 });
      const [strategyRange, setStrategyRange] = useState({ from: null, to: null });
      const [strategyGridFocus, setStrategyGridFocus] = useState(null);
      const [simulation, setSimulation] = useState({ active: false, paused: false, spot: null, previousSpot: null, initialSpot: null, simulatedNow: null, step: 0, totalSteps: 0 });
      const recalcTimerRef = useRef(null);
      const simulationTimerRef = useRef(null);
      const simulationPlanRef = useRef(null);

      async function loadStrategy(strategyId = id, { force = false } = {}) {
        if (!strategyId) return;
        setLoading(true);
        try {
          setPayload(await requestJson(`/api/strategies/${strategyId}${force ? '?force=1' : ''}`));
        } catch (error) {
          message.error(error.message);
        } finally {
          setLoading(false);
        }
      }

      useEffect(() => {
        loadStrategy(initialId);
      }, [initialId]);

      useEffect(() => () => {
        if (recalcTimerRef.current) clearTimeout(recalcTimerRef.current);
        if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
      }, []);

      useEffect(() => {
        function emitSimulationStatus(next) {
          window.dispatchEvent(new CustomEvent('sabro:simulationStatus', { detail: next }));
        }

        function advanceSimulationTick() {
          if (!simulationPlanRef.current || simulationPlanRef.current.paused) return;
          const currentPlan = simulationPlanRef.current;
          currentPlan.currentStep += 1;
          const step = Math.min(currentPlan.currentStep, currentPlan.totalSteps);
          const spot = currentPlan.prices[step];
          const previousSpot = currentPlan.prices[Math.max(0, step - 1)];
          const simulatedNow = currentPlan.simulatedDates[step];
          const active = step < currentPlan.totalSteps;
          const next = {
            active,
            paused: false,
            completed: !active,
            manual: currentPlan.manual,
            spot,
            previousSpot,
            initialSpot: currentPlan.initialSpot,
            simulatedNow,
            step,
            totalSteps: currentPlan.totalSteps
          };
          setSimulation(next);
          emitSimulationStatus(next);

          if (!active) {
            if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
            simulationTimerRef.current = null;
            simulationPlanRef.current = null;
            message.success('Simulacion finalizada.');
          }
        }

        function scheduleSimulation(plan) {
          if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
          if (plan.manual) {
            simulationTimerRef.current = null;
            return;
          }
          simulationTimerRef.current = setInterval(() => {
            advanceSimulationTick();
          }, plan.intervalMs);
        }

        function startSimulation(event) {
          const minutes = Math.max(1, Math.min(120, Number(event.detail?.minutes || 5)));
          const intervalSeconds = Math.max(1, Math.min(3600, Number(event.detail?.intervalSeconds || 60)));
          const manual = Boolean(event.detail?.manual);
          const startSpot = Number(payload?.calculation?.spot || payload?.strategy?.targetSpot || 0);
          if (!(startSpot > 0)) {
            message.error('No hay spot base para iniciar la simulacion.');
            return;
          }
          if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
          const totalSteps = Math.max(1, Math.ceil((minutes * 60) / intervalSeconds));
          const simulationStartTime = Date.now();
          const expiration = nearestExpirationTime(payload?.chain?.options || [], payload?.strategy?.expiration);
          const daysToExpiration = expiration
            ? Math.max(1, (expiration - simulationStartTime) / 86400000)
            : 50;
          const daysPerStep = daysToExpiration / totalSteps;
          const finalDrift = (Math.random() * 0.2) - 0.1;
          const prices = [];
          const simulatedDates = [];
          let last = startSpot;
          for (let step = 0; step <= totalSteps; step += 1) {
            simulatedDates.push(simulationStartTime + (daysPerStep * step * 86400000));
            if (step === 0) {
              prices.push(Number(startSpot.toFixed(2)));
              continue;
            }
            const progress = step / totalSteps;
            const target = startSpot * (1 + finalDrift * progress);
            const distanceToTarget = target - last;
            const preferredDirection = Math.random() < 0.62 ? Math.sign(distanceToTarget || finalDrift || 1) : -Math.sign(distanceToTarget || finalDrift || 1);
            const direction = last <= startSpot * 0.92 ? 1 : last >= startSpot * 1.08 ? -1 : preferredDirection;
            const dailyMovePercent = 0.015 + Math.random() * 0.065;
            const next = last * (1 + direction * dailyMovePercent);
            last = Math.max(startSpot * 0.9, Math.min(startSpot * 1.1, next));
            prices.push(Number(last.toFixed(2)));
          }
          const plan = {
            prices,
            currentStep: 0,
            totalSteps,
            intervalMs: intervalSeconds * 1000,
            initialSpot: startSpot,
            simulatedDates,
            manual,
            paused: false
          };
          simulationPlanRef.current = plan;
          const next = { active: true, paused: false, completed: false, manual, spot: prices[0], previousSpot: null, initialSpot: startSpot, simulatedNow: simulatedDates[0], step: 0, totalSteps };
          setSimulation(next);
          emitSimulationStatus(next);
          scheduleSimulation(plan);
          message.success(`Simulacion iniciada por ${minutes} min. ${manual ? 'Avance manual con barra.' : `Intervalo: ${intervalSeconds}s.`} Avance: ${formatNumber(daysPerStep, 2)} dias/tick.`);
        }

        function toggleSimulationPause() {
          const plan = simulationPlanRef.current;
          if (!plan) {
            message.info('No hay simulacion activa.');
            return;
          }

          if (plan.paused) {
            plan.paused = false;
            const next = {
              active: true,
              paused: false,
              completed: false,
              manual: plan.manual,
              spot: plan.prices[plan.currentStep],
              previousSpot: plan.prices[Math.max(0, plan.currentStep - 1)] || null,
              initialSpot: plan.initialSpot,
              simulatedNow: plan.simulatedDates[plan.currentStep],
              step: plan.currentStep,
              totalSteps: plan.totalSteps
            };
            setSimulation(next);
            emitSimulationStatus(next);
            scheduleSimulation(plan);
            return;
          }

          if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
          simulationTimerRef.current = null;
          plan.paused = true;
          const next = {
            active: false,
            paused: true,
            completed: false,
            manual: plan.manual,
            spot: plan.prices[plan.currentStep],
            previousSpot: plan.prices[Math.max(0, plan.currentStep - 1)] || null,
            initialSpot: plan.initialSpot,
            simulatedNow: plan.simulatedDates[plan.currentStep],
            step: plan.currentStep,
            totalSteps: plan.totalSteps
          };
          setSimulation(next);
          emitSimulationStatus(next);
        }

        function handleManualStep(event) {
          if (event.code !== 'Space' && event.key !== ' ') return;
          const target = event.target;
          const tagName = String(target?.tagName || '').toLowerCase();
          if (['input', 'textarea', 'select', 'button'].includes(tagName) || target?.isContentEditable) return;
          const plan = simulationPlanRef.current;
          if (!plan || !plan.manual || plan.paused) return;
          event.preventDefault();
          advanceSimulationTick();
        }

        window.addEventListener('sabro:startSimulation', startSimulation);
        window.addEventListener('sabro:toggleSimulationPause', toggleSimulationPause);
        window.addEventListener('keydown', handleManualStep);
        return () => {
          window.removeEventListener('sabro:startSimulation', startSimulation);
          window.removeEventListener('sabro:toggleSimulationPause', toggleSimulationPause);
          window.removeEventListener('keydown', handleManualStep);
        };
      }, [payload?.calculation?.spot, payload?.strategy?.targetSpot]);

      useEffect(() => {
        onStrategyNameChange?.(payload?.strategy?.name || '');
      }, [payload?.strategy?.name, onStrategyNameChange]);

      useEffect(() => {
        onSimulationEnabledChange?.(Boolean(payload?.strategy?.simulationEnabled));
      }, [payload?.strategy?.simulationEnabled, onSimulationEnabledChange]);

      useEffect(() => {
        const options = payload?.chain?.options || [];
        const strikeBySymbol = new Map(options.map((option) => [option.symbol, option.strike]));
        const loadedStrikes = (payload?.strategy?.legs || [])
          .map((leg) => strikeBySymbol.get(leg.symbol))
          .filter((strike) => Number.isFinite(Number(strike)));
        if (!loadedStrikes.length) {
          setStrategyRange({ from: null, to: null });
          return;
        }
        const from = Math.min(...loadedStrikes);
        const to = Math.max(...loadedStrikes);
        setStrategyRange((current) => current.from === from && current.to === to ? current : { from, to });
      }, [payload?.strategy?.legs, payload?.strategy?.underlying, payload?.strategy?.monthCode, payload?.chain?.options]);

      async function createStrategy(values) {
        try {
          const data = await requestJson('/api/strategies', {
            method: 'POST',
            body: JSON.stringify({
              ...values,
              legs: makeFixedLegs(),
              history: makeFixedHistory()
            })
          });
          setId(data.strategy.id);
          setPayload(data);
          window.history.pushState(null, '', `/${data.strategy.id}`);
        } catch (error) {
          message.error(error.message);
        }
      }

      async function saveStrategy(nextStrategy, { quiet = false } = {}) {
        if (!id) return;
        if (quiet) setAutoSaving(true);
        else setSaving(true);
        try {
          const data = await requestJson(`/api/strategies/${id}`, {
            method: 'PUT',
            body: JSON.stringify(nextStrategy)
          });
          setPayload(data);
        } catch (error) {
          message.error(error.message);
        } finally {
          if (quiet) setAutoSaving(false);
          else setSaving(false);
        }
      }

      if (!id) return <Landing onCreate={createStrategy} />;
      if (loading || !payload) return <Spin tip="Cargando estrategia..." fullscreen />;

      const strategy = payload.strategy;
      const rawChainOptions = payload.chain.options || [];
      const fixedLegs = makeFixedLegs(strategy.legs);
      const fixedHistory = makeFixedHistory(strategy.history);
      const simulationSpot = simulation.spot || null;
      const simulatedNow = simulation.simulatedNow || Date.now();
      const chainOptions = simulationSpot
        ? simulateOptionChain(rawChainOptions, simulationSpot, strategy, simulatedNow)
        : rawChainOptions;
      const calculation = simulationSpot
        ? calculateLocalStrategySnapshot({
            strategy: { ...strategy, legs: fixedLegs, history: fixedHistory },
            options: chainOptions,
            spot: simulationSpot,
            simulatedNow
          })
        : payload.calculation;
      if (strategy.legs.length !== fixedLegs.length || strategy.legs.some((leg, index) => leg.id !== fixedLegs[index].id || leg.type !== fixedLegs[index].type)) {
        strategy.legs = fixedLegs;
      }
      if (!Array.isArray(strategy.history) || strategy.history.length !== fixedHistory.length) {
        strategy.history = fixedHistory;
      }
      const optionSelectOptionsByType = {
        CALL: chainOptions.filter((option) => option.optionType === 'CALL').map((option) => ({
          value: option.symbol,
          label: `${option.symbol} | ${formatNumber(option.strike, 0)} | Ult ${formatNumber(option.last, 2)}`,
          option
        })),
        PUT: chainOptions.filter((option) => option.optionType === 'PUT').map((option) => ({
          value: option.symbol,
          label: `${option.symbol} | ${formatNumber(option.strike, 0)} | Ult ${formatNumber(option.last, 2)}`,
          option
        }))
      };

      const queueAutoRecalculate = (nextStrategy) => {
        if (recalcTimerRef.current) clearTimeout(recalcTimerRef.current);
        recalcTimerRef.current = setTimeout(() => {
          saveStrategy(nextStrategy, { quiet: true });
        }, 450);
      };

      const applyStrategyChange = (nextStrategy, { recalculate = true } = {}) => {
        setPayload({ ...payload, strategy: nextStrategy });
        if (recalculate) queueAutoRecalculate(nextStrategy);
      };

      const updateLeg = (rowIndex, patch) => {
        const legs = strategy.legs.map((leg, index) => index === rowIndex ? { ...leg, ...patch } : leg);
        strategy.legs = legs;
        applyStrategyChange({ ...strategy, legs });
      };

      const updateHistoryByType = (type, rowIndex, patch) => {
        const calls = fixedHistory.filter((row) => row.type === 'CALL');
        const puts = fixedHistory.filter((row) => row.type === 'PUT');
        const targetRows = type === 'CALL' ? calls : puts;
        targetRows[rowIndex] = { ...targetRows[rowIndex], ...patch, type };
        const history = [...calls, ...puts];
        strategy.history = history;
        applyStrategyChange({ ...strategy, history });
      };

      function clearHistory() {
        const history = makeFixedHistory(strategy.history).map((row) => ({
          ...row,
          date: '',
          quantity: '',
          symbol: '',
          premium: '',
          manualPrice: '',
          realized: 0
        }));
        strategy.history = history;
        applyStrategyChange({ ...strategy, history });
        message.success('Historial del dia limpiado.');
      }

      function mergeHistoryTrade(existingRow, trade) {
        const existingQuantity = parseNumeric(existingRow.quantity) ?? 0;
        const existingPremium = parseNumeric(existingRow.premium) ?? 0;
        const existingRealized = parseNumeric(existingRow.realized) ?? 0;
        const tradeQuantity = parseNumeric(trade.quantity) ?? 0;
        const tradePremium = parseNumeric(trade.premium) ?? 0;
        const nextQuantity = existingQuantity + tradeQuantity;
        let nextPremium = existingPremium || tradePremium;
        let nextRealized = existingRealized;

        if (existingQuantity === 0 || Math.sign(existingQuantity) === Math.sign(tradeQuantity)) {
          const totalAbs = Math.abs(existingQuantity) + Math.abs(tradeQuantity);
          nextPremium = totalAbs > 0
            ? ((Math.abs(existingQuantity) * existingPremium) + (Math.abs(tradeQuantity) * tradePremium)) / totalAbs
            : tradePremium;
        } else {
          const closedQuantity = Math.min(Math.abs(existingQuantity), Math.abs(tradeQuantity));
          const realizedPerOption = existingQuantity > 0
            ? tradePremium - existingPremium
            : existingPremium - tradePremium;
          nextRealized += realizedPerOption * closedQuantity * OPTION_MULTIPLIER;
          if (nextQuantity === 0) nextPremium = tradePremium;
          else if (Math.sign(nextQuantity) !== Math.sign(existingQuantity)) nextPremium = tradePremium;
        }

        return {
          ...existingRow,
          type: trade.type,
          quantity: nextQuantity === 0 ? 0 : Number(nextQuantity.toFixed(6)),
          symbol: trade.symbol,
          premium: Number(nextPremium.toFixed(3)),
          realized: Number(nextRealized.toFixed(2))
        };
      }

      function transferLegToHistory(rowIndex) {
        const row = strategyRowsWithTarget[rowIndex];
        const originalIndex = originalIndexById.get(row?.id);
        const quantity = parseNumeric(row?.quantity);
        const symbol = String(row?.symbol || '').toUpperCase();
        const premium = currentPremiumForLeg(row);
        if (!(quantity !== null && quantity !== 0) || !symbol || !(premium > 0)) {
          message.info('Completá cantidad, base y prima para pasar al historial.');
          return;
        }

        const history = makeFixedHistory(strategy.history);
        const calls = history.filter((item) => item.type === 'CALL');
        const puts = history.filter((item) => item.type === 'PUT');
        const targetRows = row.type === 'CALL' ? calls : puts;
        const trade = { type: row.type, quantity, symbol, premium };
        let targetIndex = targetRows.findIndex((item) => String(item.symbol || '').toUpperCase() === symbol);
        if (targetIndex === -1) targetIndex = targetRows.findIndex((item) => !item.symbol && (item.quantity === '' || item.quantity === 0) && (item.premium === '' || item.premium === 0));
        if (targetIndex === -1) {
          targetRows.push({
            id: `history-${row.type.toLowerCase()}-${targetRows.length + 1}`,
            type: row.type,
            quantity: '',
            symbol: '',
            premium: '',
            manualPrice: '',
            realized: 0
          });
          targetIndex = targetRows.length - 1;
        }

        targetRows[targetIndex] = mergeHistoryTrade(targetRows[targetIndex], trade);
        const legs = strategy.legs.map((leg, index) => index === originalIndex ? { ...leg, quantity: '', manualPrice: '' } : leg);
        const nextStrategy = { ...strategy, legs, history: [...calls, ...puts] };
        strategy.legs = legs;
        strategy.history = nextStrategy.history;
        applyStrategyChange(nextStrategy);
        message.success(`${symbol} enviado al historial.`);
      }

      function copyStrategyBlock(type) {
        const rows = strategyRowsWithTarget
          .filter((leg) => leg.type === type)
          .filter((leg) => leg.quantity !== '' || leg.symbol || leg.premium !== '')
          .map((leg) => [leg.quantity || '', leg.symbol || '', leg.premium || ''].join('\t'));
        const text = rows.join('\n');
        if (!text) {
          message.info(`No hay ${type} cargados para copiar.`);
          return;
        }
        navigator.clipboard.writeText(text)
          .then(() => message.success(`${type} copiados como tabla.`))
          .catch(() => message.error('No pude copiar al portapapeles.'));
      }

      function parsePastedRows(text) {
        return String(text || '')
          .trim()
          .split(/\r?\n/)
          .map((line) => {
            const separator = line.includes('\t') ? '\t' : line.includes(';') ? ';' : ',';
            return line.split(separator).map((cell) => cell.trim());
          })
          .filter((cells) => cells.some(Boolean));
      }

      function handleHistoryPaste(event, targetType) {
        const text = event.clipboardData?.getData('text/plain');
        const pastedRows = parsePastedRows(text);
        if (!pastedRows.length) return;
        event.preventDefault();

        const history = makeFixedHistory(strategy.history);
        const calls = history.filter((row) => row.type === 'CALL');
        const puts = history.filter((row) => row.type === 'PUT');
        const targetRows = targetType === 'CALL' ? calls : puts;
        const startIndex = focusedHistoryTarget.type === targetType ? focusedHistoryTarget.index : 0;
        let writeIndex = Math.max(0, Math.min(startIndex || 0, targetRows.length - 1));

        for (const cells of pastedRows) {
          if (writeIndex >= targetRows.length) break;
          const current = targetRows[writeIndex];
          let next = {};
          const first = String(cells[0] || '').toUpperCase();

          if (['CALL', 'PUT'].includes(first)) {
            next = { quantity: cells[1] || '', symbol: cells[2] || '', premium: cells[3] || '' };
          } else if (['CALL', 'PUT'].includes(String(cells[1] || '').toUpperCase())) {
            next = { quantity: cells[2] || '', symbol: cells[3] || '', premium: cells[4] || '' };
          } else {
            next = { quantity: cells[0] || '', symbol: cells[1] || '', premium: cells[2] || '' };
          }

          targetRows[writeIndex] = {
            ...current,
            ...next,
            type: targetType,
            symbol: String(next.symbol ?? current.symbol ?? '').toUpperCase()
          };
          writeIndex += 1;
        }

        applyStrategyChange({ ...strategy, history: [...calls, ...puts] });
        message.success(`Pegado en historial ${targetType}.`);
      }

      function ResultValue({ value }) {
        const numeric = Number(value);
        const className = numeric < 0 ? 'result-negative' : 'result-positive';
        return <span className={className}>{formatNumber(value, 0)}</span>;
      }

      const legResultById = new Map((calculation.legs || []).map((leg) => [leg.id, leg]));
      const legsWithResults = fixedLegs.map((leg) => ({
        ...leg,
        result: legResultById.get(leg.id)
      }));
      const originalIndexById = new Map(fixedLegs.map((leg, index) => [leg.id, index]));
      const quantityByTypeStrike = new Map();
      for (const leg of calculation.legs || []) {
        const key = `${leg.type}-${leg.strike}`;
        quantityByTypeStrike.set(key, (quantityByTypeStrike.get(key) || 0) + Number(leg.quantity || 0));
      }
      const optionsByStrike = new Map();
      for (const option of chainOptions) {
        if (!optionsByStrike.has(option.strike)) optionsByStrike.set(option.strike, { key: option.strike, strike: option.strike, call: null, put: null });
        const row = optionsByStrike.get(option.strike);
        if (option.optionType === 'CALL') row.call = option;
        if (option.optionType === 'PUT') row.put = option;
      }
      const baseRows = Array.from(optionsByStrike.values()).sort((a, b) => a.strike - b.strike);
      const monthLabel = MONTHS.find((item) => item.value === strategy.monthCode)?.label || strategy.monthCode;
      const rangeBaseOptions = baseRows.map((row) => ({
        value: row.strike,
        label: `${strategy.underlying} ${formatNumber(row.strike, 0)} ${monthLabel}`
      }));

      function optionPremium(option, fallback = '') {
        if (!option) return fallback;
        return option.last || option.ask || option.bid || fallback;
      }

      function buildRangeLegs(type, selectedRows) {
        const existingBySymbol = new Map(
          fixedLegs
            .filter((leg) => leg.type === type && leg.symbol)
            .map((leg) => [leg.symbol, leg])
        );
        const rowCount = Math.max(DEFAULT_STRATEGY_ROWS_PER_SIDE, selectedRows.length);
        const rows = Array.from({ length: rowCount }, (_item, index) => {
          const option = selectedRows[index]?.[type.toLowerCase()];
          const existing = option ? existingBySymbol.get(option.symbol) : null;
          return {
            id: `${type.toLowerCase()}-${index + 1}`,
            type,
            quantity: existing?.quantity ?? '',
            symbol: option?.symbol || '',
            premium: option ? optionPremium(option, existing?.premium ?? '') : '',
            manualPrice: existing?.manualPrice ?? ''
          };
        });
        return rows;
      }

      function applyStrategyRange(nextRange) {
        setStrategyRange(nextRange);
        if (nextRange.from === null || nextRange.to === null) return;
        const from = Math.min(Number(nextRange.from), Number(nextRange.to));
        const to = Math.max(Number(nextRange.from), Number(nextRange.to));
        const selectedRows = baseRows.filter((row) => row.strike >= from && row.strike <= to);
        if (!selectedRows.length) {
          message.info('No hay bases en ese rango.');
          return;
        }
        const legs = [
          ...buildRangeLegs('CALL', selectedRows),
          ...buildRangeLegs('PUT', selectedRows)
        ];
        strategy.legs = legs;
        applyStrategyChange({ ...strategy, legs });
      }

      function targetPremiumForLeg(leg) {
        const targetSpot = Number(strategy.targetSpot);
        if (!(targetSpot > 0) || !leg.symbol) return '';
        const result = leg.result;
        const contract = contractForLeg(leg);
        const strike = Number(result?.strike || contract?.strike);
        if (!(strike > 0)) return '';
        const autoIv = autoIvForLeg(leg);
        const volatility = strategy.useAutoIv && autoIv
          ? autoIv
          : Number(strategy.volatility || 0.4);
        const price = blackScholesPrice({
          type: leg.type,
          spot: targetSpot,
          strike,
          years: yearsToExpiration(contract?.expiration || strategy.expiration, simulatedNow),
          volatility,
          rate: Number(strategy.riskFreeRate || 0.125)
        });
        return Number.isFinite(price) ? formatNumber(price, 3) : '';
      }

      function contractForLeg(leg) {
        const symbol = String(leg.symbol || '').toUpperCase();
        return leg.result?.contract || chainOptions.find((option) => option.symbol === symbol);
      }

      function autoIvForLeg(leg) {
        const iv = leg.result?.impliedVolatility ?? contractForLeg(leg)?.impliedVolatility;
        const numeric = Number(iv);
        return Number.isFinite(numeric) && numeric > 0 ? numeric : null;
      }

      function currentPremiumForLeg(leg) {
        return marketPremiumForLeg(leg) ?? parseNumeric(leg.premium);
      }

      function marketPremiumForLeg(leg) {
        const contract = contractForLeg(leg);
        return parseNumeric(leg.result?.currentPrice)
          ?? parseNumeric(contract?.mark)
          ?? parseNumeric(contract?.last)
          ?? parseNumeric(contract?.ask)
          ?? parseNumeric(contract?.bid);
      }

      function displayPremiumForLeg(leg) {
        const marketPremium = marketPremiumForLeg(leg);
        if (marketPremium !== null) return marketPremium;
        return leg.premium;
      }

      const strategyRowsWithTarget = legsWithResults.map((leg) => {
        const autoIv = autoIvForLeg(leg);
        return {
          ...leg,
          premium: displayPremiumForLeg(leg),
          autoIv: autoIv ? formatPercent(autoIv) : '',
          targetPremium: targetPremiumForLeg(leg)
        };
      });

      const bestTargetHighlights = (() => {
        const targetSpot = parseNumeric(strategy.targetSpot);
        if (!(targetSpot > 0)) return {};

        const candidates = strategyRowsWithTarget
          .map((row) => {
            const type = String(row.type || '').toUpperCase();
            const contract = contractForLeg(row);
            const strike = parseNumeric(row.result?.strike) ?? parseNumeric(contract?.strike);
            const premium = currentPremiumForLeg(row);
            if (!row.symbol || !['CALL', 'PUT'].includes(type) || !(strike > 0) || !(premium > 0)) return null;
            const valueAtTarget = type === 'PUT'
              ? Math.max(strike - targetSpot, 0)
              : Math.max(targetSpot - strike, 0);
            const gain = valueAtTarget - premium;
            const performance = gain / premium;
            if (!(performance > 0)) return null;
            return {
              symbol: String(row.symbol).toUpperCase(),
              performance,
              valueAtTarget,
              gain
            };
          })
          .filter(Boolean);

        if (!candidates.length) return {};
        const bestPerformance = Math.max(...candidates.map((candidate) => candidate.performance));
        const threshold = bestPerformance * (1 - BEST_TARGET_TOLERANCE);

        return candidates.reduce((highlights, candidate) => {
          if (candidate.performance < threshold) return highlights;
          highlights[candidate.symbol] = {
            title: `Mejor rendimiento estimado para spot target: ${formatNumber(candidate.performance * 100, 1)}%`
          };
          return highlights;
        }, {});
      })();

      function updateStrategyLegRow(rowIndex, patch) {
        const row = strategyRowsWithTarget[rowIndex];
        const originalIndex = originalIndexById.get(row?.id);
        if (originalIndex === undefined) return;

        const currentLeg = fixedLegs[originalIndex];
        const nextPatch = { ...patch };
        if (
          Object.prototype.hasOwnProperty.call(patch, 'quantity')
          && !Object.prototype.hasOwnProperty.call(patch, 'premium')
          && row?.premium !== ''
          && row?.premium !== undefined
        ) {
          nextPatch.premium = row.premium;
        }

        updateLeg(originalIndex, nextPatch);
      }

      function focusNearestStrategyBase(targetPrice) {
        updateMeta({ targetSpot: targetPrice });
        const rowsWithStrike = strategyRowsWithTarget
          .map((row, index) => {
            const contract = contractForLeg(row);
            return { index, strike: Number(row.result?.strike || contract?.strike) };
          })
          .filter((item) => Number.isFinite(item.strike) && item.strike > 0);

        if (!rowsWithStrike.length) {
          message.info('No hay bases cargadas para enfocar.');
          return;
        }

        const nearest = rowsWithStrike.reduce((best, item) => {
          if (!best) return item;
          const bestDistance = Math.abs(best.strike - targetPrice);
          const itemDistance = Math.abs(item.strike - targetPrice);
          if (itemDistance < bestDistance) return item;
          if (itemDistance === bestDistance && item.strike > best.strike) return item;
          return best;
        }, null);

        setStrategyGridFocus({
          row: nearest.index,
          col: 0,
          token: `${nearest.index}-${targetPrice}-${Date.now()}`
        });
      }

      const simulationRows = calculation.percentScenarios || [];
      const legColumns = [
        {
          title: 'TIPO',
          dataIndex: 'type',
          width: 58,
          onCell: (row) => ({ className: row.type === 'PUT' ? 'sheet-type-put' : 'sheet-type-call' }),
          render: (value) => value
        },
        {
          title: 'CANT',
          dataIndex: 'quantity',
          width: 68,
          className: 'sheet-input',
          render: (value, row) => (
            <InputNumber size="small" value={value} style={{ width: 62 }} onChange={(quantity) => updateLeg(originalIndexById.get(row.id), { quantity })} />
          )
        },
        {
          title: 'BASE',
          dataIndex: 'symbol',
          width: 138,
          className: 'sheet-input',
          render: (value, row) => (
            <Select
              showSearch
              size="small"
              value={value || undefined}
              placeholder="Base"
              style={{ width: 132 }}
              options={optionSelectOptionsByType[row.type] || []}
              optionFilterProp="label"
              onChange={(symbol) => {
                const selected = chainOptions.find((option) => option.symbol === symbol);
                const originalIndex = originalIndexById.get(row.id);
                updateLeg(originalIndex, { symbol, premium: selected?.last || selected?.ask || strategy.legs[originalIndex].premium });
              }}
            />
          )
        },
        {
          title: 'PRIMA',
          dataIndex: 'premium',
          width: 78,
          className: 'sheet-input',
          render: (value, row) => (
            <InputNumber size="small" value={value} min={0} step={0.01} style={{ width: 72 }} onChange={(premium) => updateLeg(originalIndexById.get(row.id), { premium })} />
          )
        },
        {
          title: 'BRUTO',
          width: 78,
          className: 'sheet-calc',
          render: (_value, row) => formatNumber(row.result?.gross, 0)
        },
        {
          title: 'NETO',
          width: 78,
          className: 'sheet-calc',
          render: (_value, row) => formatNumber(row.result?.net, 0)
        },
        {
          title: '$ HOY',
          width: 76,
          className: 'sheet-calc',
          render: (_value, row) => formatNumber(row.result?.currentPrice, 3)
        },
        {
          title: '$ HOY',
          width: 76,
          className: 'sheet-calc',
          render: (_value, row) => formatNumber(row.result?.currentValue, 0)
        },
        {
          title: 'DIF. CPRA.',
          width: 88,
          className: 'sheet-calc',
          render: (_value, row) => formatNumber(row.result?.todayResult, 0)
        },
      ];

      function hasHistoryContent(row) {
        return row.quantity !== '' || row.symbol || row.premium !== '';
      }

      function visibleHistoryRows(type, strategyRows) {
        const rows = fixedHistory.filter((row) => row.type === type);
        const lastContentIndex = rows.reduce((lastIndex, row, index) => hasHistoryContent(row) ? index : lastIndex, -1);
        const visibleCount = Math.max(strategyRows.length, lastContentIndex + 1);
        return rows.slice(0, visibleCount).map((row, index) => ({
          ...row,
          tableIndex: index,
          result: legResultById.get(row.id)
        }));
      }

      const historyRowsWithResults = [
        ...visibleHistoryRows('CALL', strategyRowsWithTarget.filter((row) => row.type === 'CALL')),
        ...visibleHistoryRows('PUT', strategyRowsWithTarget.filter((row) => row.type === 'PUT'))
      ];

      const makeHistoryColumns = (type) => [
        {
          title: 'CANT',
          dataIndex: 'quantity',
          width: 72,
          className: 'sheet-input',
          render: (value, row) => (
            <InputNumber
              size="small"
              value={value}
              style={{ width: 66 }}
              onFocus={() => setFocusedHistoryTarget({ type, index: row.tableIndex })}
              onChange={(quantity) => updateHistoryByType(type, row.tableIndex, { quantity })}
            />
          )
        },
        {
          title: 'BASE',
          dataIndex: 'symbol',
          width: 138,
          className: 'sheet-input',
          render: (value, row) => (
            <Select
              showSearch
              size="small"
              value={value || undefined}
              placeholder="Base"
              style={{ width: 132 }}
              options={optionSelectOptionsByType[type] || []}
              optionFilterProp="label"
              onFocus={() => setFocusedHistoryTarget({ type, index: row.tableIndex })}
              onChange={(symbol) => {
                const selected = chainOptions.find((option) => option.symbol === symbol);
                updateHistoryByType(type, row.tableIndex, { symbol, premium: selected?.last || selected?.ask || row.premium });
              }}
            />
          )
        },
        {
          title: 'PRIMA/PRECIO',
          dataIndex: 'premium',
          width: 96,
          className: 'sheet-input',
          render: (value, row) => (
            <InputNumber
              size="small"
              value={value}
              min={0}
              step={0.01}
              style={{ width: 88 }}
              onFocus={() => setFocusedHistoryTarget({ type, index: row.tableIndex })}
              onChange={(premium) => updateHistoryByType(type, row.tableIndex, { premium })}
            />
          )
        }
      ];

      const simulationColumns = [
        {
          title: '%',
          dataIndex: 'percent',
          width: 72,
          onCell: (row) => ({ className: row.percent < 0 ? 'sim-negative' : row.percent === 0 ? 'sim-zero' : 'sim-positive' }),
          render: (value) => `${value}%`
        },
        {
          title: 'Precio',
          dataIndex: 'underlyingPrice',
          width: 105,
          render: (value) => (
            <button type="button" className="target-price-button" onClick={() => focusNearestStrategyBase(value)}>
              {formatNumber(value, 2)}
            </button>
          )
        },
        {
          title: 'Rtdo. Finish',
          dataIndex: 'finish',
          width: 112,
          className: 'result-cell',
          render: (value) => <ResultValue value={value} />
        },
        {
          title: 'Rtdo. Teórico',
          dataIndex: 'theoretical',
          width: 112,
          className: 'result-cell',
          render: (value) => <ResultValue value={value} />
        }
      ];

      const basesColumns = [
        { title: 'TIPO', width: 62, className: 'call-side', render: () => 'CALL' },
        {
          title: 'CANT',
          width: 64,
          className: 'base-side',
          render: (_value, row) => formatNumber(quantityByTypeStrike.get(`CALL-${row.strike}`) || 0, 0)
        },
        {
          title: 'BASE',
          width: 88,
          className: 'base-side',
          render: (_value, row) => formatNumber(row.strike, 2)
        },
        {
          title: 'VI Auto',
          width: 78,
          className: 'vi-cell',
          render: (_value, row) => formatPercent(row.call?.impliedVolatility)
        },
        {
          title: 'VI Manual',
          width: 84,
          className: 'vi-cell',
          render: () => formatPercent(strategy.volatility)
        },
        { title: 'TIPO', width: 62, className: 'put-side', render: () => 'PUT' },
        {
          title: 'CANT',
          width: 64,
          className: 'base-side',
          render: (_value, row) => formatNumber(quantityByTypeStrike.get(`PUT-${row.strike}`) || 0, 0)
        },
        {
          title: 'BASE',
          width: 88,
          className: 'base-side',
          render: (_value, row) => formatNumber(row.strike, 2)
        },
        {
          title: 'VI Auto',
          width: 78,
          className: 'vi-cell',
          render: (_value, row) => formatPercent(row.put?.impliedVolatility)
        },
        {
          title: 'VI Manual',
          width: 84,
          className: 'vi-cell',
          render: () => formatPercent(strategy.volatility)
        }
      ];

      const updateMeta = (patch) => {
        if (Object.prototype.hasOwnProperty.call(patch, 'simulationEnabled') && !patch.simulationEnabled) {
          if (simulationTimerRef.current) clearInterval(simulationTimerRef.current);
          simulationTimerRef.current = null;
          simulationPlanRef.current = null;
          const stoppedSimulation = { active: false, paused: false, completed: false, spot: null, previousSpot: null, initialSpot: null, simulatedNow: null, step: 0, totalSteps: 0 };
          setSimulation(stoppedSimulation);
          window.dispatchEvent(new CustomEvent('sabro:simulationStatus', { detail: stoppedSimulation }));
        }
        applyStrategyChange({ ...strategy, ...patch });
      };
      const simulationChangePercent = simulation.previousSpot && calculation.spot
        ? ((Number(calculation.spot) / Number(simulation.previousSpot)) - 1) * 100
        : null;
      const simulationDateLabel = simulation.simulatedNow
        ? dayjs(simulation.simulatedNow).format('DD/MM/YYYY')
        : null;

      return (
        <>
          <div className="toolbar" style={{ marginBottom: 12 }}>
            <Input value={strategy.name} style={{ width: 240 }} onChange={(event) => updateMeta({ name: event.target.value })} />
            <Select value={strategy.underlying} style={{ width: 110 }} options={UNDERLYINGS.map((value) => ({ value, label: value }))} onChange={(underlying) => updateMeta({ underlying })} />
            <Select value={strategy.monthCode} style={{ width: 130 }} options={MONTHS} onChange={(monthCode) => updateMeta({ monthCode })} />
            <InputNumber value={strategy.volatility} min={0.01} step={0.01} style={{ width: 120 }} onChange={(volatility) => updateMeta({ volatility })} />
            <InputNumber value={strategy.riskFreeRate} min={0} step={0.005} style={{ width: 120 }} onChange={(riskFreeRate) => updateMeta({ riskFreeRate })} />
            <Space size={6} align="center">
              <span className="muted">VI</span>
              <Switch
                checked={Boolean(strategy.useAutoIv)}
                checkedChildren="Auto"
                unCheckedChildren="Manual"
                onChange={(useAutoIv) => updateMeta({ useAutoIv })}
              />
            </Space>
            <Space size={6} align="center">
              <span className="muted">Simulacion</span>
              <Switch
                checked={Boolean(strategy.simulationEnabled)}
                checkedChildren="On"
                unCheckedChildren="Off"
                onChange={(simulationEnabled) => updateMeta({ simulationEnabled })}
              />
            </Space>
            <Button type="primary" icon={<SaveOutlined />} loading={saving} onClick={() => saveStrategy(strategy)}>Guardar y recalcular</Button>
            <Button icon={<ReloadOutlined />} onClick={() => loadStrategy(id, { force: true })}>Actualizar IOL</Button>
            {autoSaving ? <Tag color="gold">Recalculando...</Tag> : <Tag color="green">Auto</Tag>}
            <Tag color="blue">/{id}</Tag>
          </div>

          <div className="metrics">
            <div className="metric">
              <div className="metric-label">Spot estimado</div>
              <div className="metric-value">
                {formatNumber(calculation.spot, 2)}
                {simulationChangePercent !== null ? (
                  <span className={simulationChangePercent >= 0 ? 'positive' : 'negative'} style={{ marginLeft: 8, fontSize: 13 }}>
                    {simulationChangePercent >= 0 ? '+' : ''}{formatNumber(simulationChangePercent, 2)}%
                  </span>
                ) : null}
              </div>
              {simulationChangePercent !== null ? <div className="metric-label">vs. actualizacion anterior</div> : null}
              {simulationDateLabel ? <div className="metric-label">Fecha simulada {simulationDateLabel}</div> : null}
            </div>
            <div className="metric"><div className="metric-label">Neto inicial</div><div className="metric-value">{formatMoney(calculation.summary.net)}</div></div>
            <div className="metric"><div className="metric-label">Resultado hoy</div><div className={`metric-value ${calculation.summary.todayResult >= 0 ? 'positive' : 'negative'}`}>{formatMoney(calculation.summary.todayResult)}</div></div>
            <div className="metric"><div className="metric-label">Delta global</div><div className="metric-value">{formatNumber(calculation.summary.delta, 2)}</div></div>
          </div>

          <div className="spreadsheet-grid">
            <section className="panel">
              <div className="sheet-title-row">
                <span className="sheet-title-text">Simulaciones ↓</span>
                <div className="range-controls">
                  <span>Desde</span>
                  <Select
                    size="small"
                    showSearch
                    allowClear
                    value={strategyRange.from ?? undefined}
                    placeholder="Base"
                    style={{ width: 165 }}
                    options={rangeBaseOptions}
                    optionFilterProp="label"
                    onChange={(from) => applyStrategyRange({ ...strategyRange, from: from ?? null })}
                  />
                  <span>Hasta</span>
                  <Select
                    size="small"
                    showSearch
                    allowClear
                    value={strategyRange.to ?? undefined}
                    placeholder="Base"
                    style={{ width: 165 }}
                    options={rangeBaseOptions}
                    optionFilterProp="label"
                    onChange={(to) => applyStrategyRange({ ...strategyRange, to: to ?? null })}
                  />
                </div>
              </div>
              <div className="panel-header" style={{ minHeight: 34 }}>
                <div className="panel-title">Carga de estrategia</div>
                <Space size={6}>
                  <span className="muted">Spot target</span>
                  <InputNumber
                    size="small"
                    value={strategy.targetSpot}
                    min={0}
                    step={10}
                    placeholder={formatNumber(calculation.spot, 0)}
                    style={{ width: 108 }}
                    onChange={(targetSpot) => updateMeta({ targetSpot })}
                  />
                  <Button size="small" onClick={() => copyStrategyBlock('CALL')}>Copiar CALLS</Button>
                  <Button size="small" onClick={() => copyStrategyBlock('PUT')}>Copiar PUTS</Button>
                </Space>
              </div>
              <SpreadsheetInputGrid
                rows={strategyRowsWithTarget}
                getRowType={(row) => row.type}
                optionsByType={optionSelectOptionsByType}
                extraColumnsAfterSymbol={[{ key: 'autoIv', title: 'VI AUTO' }]}
                extraColumns={[
                  { key: 'targetPremium', title: 'PRIMA TARGET' },
                  {
                    key: 'actions',
                    title: 'ACCIONES',
                    render: (_value, row, rowIndex) => (
                      <Button
                        size="small"
                        icon={<SendOutlined />}
                        title="Enviar al historial"
                        onMouseDown={(event) => event.stopPropagation()}
                        onClick={() => transferLegToHistory(rowIndex)}
                      />
                    )
                  }
                ]}
                onUpdate={updateStrategyLegRow}
                focusRequest={strategyGridFocus}
                targetHighlights={bestTargetHighlights}
              />
            </section>

            <section className="panel">
              <Table
                className="sheet-table"
                size="small"
                rowKey={(row) => row.percent}
                pagination={false}
                columns={simulationColumns}
                dataSource={simulationRows}
              />
            </section>

            <section className="panel">
              <div className="panel-header">
                <Space size={8}>
                  <div className="panel-title">Historial del dia</div>
                  <Popconfirm
                    title="Limpiar historial"
                    description="Borra todas las operaciones del historial del dia."
                    okText="Limpiar"
                    cancelText="Cancelar"
                    onConfirm={clearHistory}
                  >
                    <Button size="small" danger>Limpiar</Button>
                  </Popconfirm>
                </Space>
                <span className="muted">cantidad/base/prima</span>
              </div>
              <SpreadsheetInputGrid
                rows={historyRowsWithResults}
                getRowType={(row) => row.type}
                optionsByType={optionSelectOptionsByType}
                premiumTitle="PRIMA/PRECIO"
                onCellFocus={(rowIndex) => {
                  const row = historyRowsWithResults[rowIndex];
                  if (row) setFocusedHistoryTarget({ type: row.type, index: row.tableIndex });
                }}
                onUpdate={(rowIndex, patch) => {
                  const row = historyRowsWithResults[rowIndex];
                  if (row) updateHistoryByType(row.type, row.tableIndex, patch);
                }}
              />
            </section>
          </div>

          <section className="panel" style={{ marginTop: 12 }}>
            <div className="panel-header">
              <div className="panel-title">Detalle de cadena IOL</div>
              <span className="muted">{chainOptions.length} opciones, VI Auto calculada con Black-Scholes</span>
            </div>
            <div className="payoff-wrap">
              <PayoffChart scenarios={calculation.scenarios} />
            </div>
          </section>

          <section className="panel" style={{ marginTop: 12 }}>
            <div className="panel-header">
              <div className="panel-title">Bases disponibles</div>
              <span className="muted">{baseRows.length} bases visibles</span>
            </div>
            <Table
              className="sheet-table"
              size="small"
              rowKey="strike"
              pagination={false}
              columns={basesColumns}
              dataSource={baseRows}
              scroll={{ x: 732, y: 420 }}
            />
          </section>
        </>
      );
    }

    function App() {
      const [strategyName, setStrategyName] = useState('');
      const [simulationEnabled, setSimulationEnabled] = useState(false);
      const [simulationMinutes, setSimulationMinutes] = useState(5);
      const [simulationIntervalSeconds, setSimulationIntervalSeconds] = useState(60);
      const [simulationManual, setSimulationManual] = useState(false);
      const [simulationStatus, setSimulationStatus] = useState({ active: false, paused: false, completed: false, manual: false, step: 0, totalSteps: 0, spot: null, previousSpot: null, initialSpot: null });
      const pageTitle = strategyName ? `Planilla Sabro - ${strategyName}` : 'Planilla Sabro';

      useEffect(() => {
        document.title = pageTitle;
      }, [pageTitle]);

      useEffect(() => {
        const updateStatus = (event) => setSimulationStatus(event.detail || { active: false, step: 0, totalSteps: 0, spot: null });
        window.addEventListener('sabro:simulationStatus', updateStatus);
        return () => window.removeEventListener('sabro:simulationStatus', updateStatus);
      }, []);

      function startSimulation() {
        window.dispatchEvent(new CustomEvent('sabro:startSimulation', {
          detail: { minutes: simulationMinutes, intervalSeconds: simulationIntervalSeconds, manual: simulationManual }
        }));
      }

      function toggleSimulationPause() {
        window.dispatchEvent(new CustomEvent('sabro:toggleSimulationPause'));
      }

      return (
        <ConfigProvider theme={{ algorithm: theme.darkAlgorithm, token: { colorPrimary: '#2f93ff', borderRadius: 6 } }}>
          <main className="page">
            <header className="topbar">
              <div className="brand">
                <h1>{pageTitle}</h1>
                <span>Motor web de estrategias</span>
              </div>
              <Space>
                <Button href="/cotizaciones">Cotizaciones</Button>
                {simulationEnabled ? (
                  <>
                    <InputNumber
                      size="small"
                      min={1}
                      max={120}
                      step={1}
                      value={simulationMinutes}
                      addonAfter="min"
                      style={{ width: 104 }}
                      onChange={(value) => setSimulationMinutes(value || 1)}
                    />
                    <InputNumber
                      size="small"
                      min={1}
                      max={3600}
                      step={5}
                      value={simulationIntervalSeconds}
                      addonAfter="seg"
                      style={{ width: 106 }}
                      onChange={(value) => setSimulationIntervalSeconds(value || 1)}
                    />
                    <Space size={4}>
                      <span className="muted">Manual</span>
                      <Switch
                        size="small"
                        checked={simulationManual}
                        disabled={simulationStatus.active || simulationStatus.paused}
                        onChange={setSimulationManual}
                      />
                    </Space>
                    <Button icon={<PlayCircleOutlined />} onClick={startSimulation} disabled={simulationStatus.active || simulationStatus.paused}>
                      {simulationStatus.active || simulationStatus.paused ? `Sim ${simulationStatus.step}/${simulationStatus.totalSteps}` : 'Iniciar simulacion'}
                    </Button>
                    <Button
                      icon={simulationStatus.paused ? <PlayCircleOutlined /> : <PauseCircleOutlined />}
                      onClick={toggleSimulationPause}
                      disabled={!simulationStatus.active && !simulationStatus.paused}
                    >
                      {simulationStatus.paused ? 'Reanudar' : 'Pausar'}
                    </Button>
                    {simulationStatus.active && simulationStatus.manual ? <Tag color="blue">Barra = siguiente tick</Tag> : null}
                    {simulationStatus.completed ? <Tag color="green">Simulacion completa</Tag> : null}
                  </>
                ) : null}
                <Button href="/" type="primary">Nueva estrategia</Button>
              </Space>
            </header>
            <div className="content">
              <StrategyPage
                initialId={getStrategyIdFromPath()}
                onStrategyNameChange={setStrategyName}
                onSimulationEnabledChange={setSimulationEnabled}
              />
            </div>
          </main>
        </ConfigProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
