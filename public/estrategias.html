<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Estrategias de Opciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.21.6/dist/reset.css" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #101721;
      --panel: #172131;
      --panel-2: #202b3b;
      --line: #334259;
      --text: #eef3f8;
      --muted: #98a7b8;
      --blue: #2f93ff;
      --yellow: #f2dd22;
      --green: #20c65a;
      --red: #ff4d4f;
      --orange: #ff9f1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1180px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      background: linear-gradient(180deg, #151f2d 0, #0f1620 100%);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #182232;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .content {
      padding: 14px 16px 28px;
    }

    .landing {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 16px;
      align-items: stretch;
      min-height: calc(100vh - 84px);
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      padding: 44px;
      background:
        linear-gradient(90deg, rgba(16, 23, 33, 0.18), rgba(16, 23, 33, 0.92)),
        url("https://images.unsplash.com/photo-1642790551116-18e150f248e5?auto=format&fit=crop&w=1800&q=80") center / cover;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .hero h2 {
      max-width: 720px;
      margin: 0;
      color: #fff;
      font-size: 46px;
      line-height: 1.04;
      font-weight: 950;
    }

    .hero p {
      max-width: 620px;
      margin: 0;
      color: #d6e1ee;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 600;
    }

    .landing-panel {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .strategy-grid {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) 420px;
      gap: 12px;
    }

    .spreadsheet-grid {
      display: grid;
      grid-template-columns: minmax(620px, 1.35fr) minmax(360px, 0.65fr) minmax(520px, 0.9fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #202b3b;
    }

    .panel-title {
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      min-height: 58px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
    }

    .metric-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 4px;
      color: #fff;
      font-size: 19px;
      font-weight: 900;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .muted { color: var(--muted); }
    .symbol { color: var(--blue); font-weight: 900; }
    .payoff-wrap { padding: 10px; }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(360px, 1fr));
      gap: 12px;
      padding: 10px;
    }

    .history-block-title {
      padding: 5px 8px;
      border: 1px solid #111;
      border-bottom: 0;
      background: #366291;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .input-grid-wrap {
      overflow: auto;
      outline: none;
    }

    .input-grid {
      width: 100%;
      min-width: 420px;
      border-collapse: collapse;
      background: #f2f2f2;
      color: #050505;
      font-family: Arial, Helvetica, sans-serif;
      table-layout: fixed;
    }

    .input-grid th {
      height: 24px;
      padding: 4px 5px;
      border: 1px solid #111;
      background: #366291;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .input-grid td {
      height: 28px;
      padding: 0;
      border: 1px solid #222;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.05;
      user-select: none;
    }

    .input-grid .type-cell {
      width: 62px;
      padding: 4px 6px;
      text-align: center;
    }

    .input-grid .type-call,
    .input-grid .type-call .type-cell {
      background: #ffffb3;
    }

    .input-grid .type-put,
    .input-grid .type-put .type-cell {
      background: #e5c0ef;
    }

    .input-grid .edit-cell {
      position: relative;
      padding: 4px 6px;
      background: #b8dfe8;
      cursor: cell;
      overflow: hidden;
      white-space: nowrap;
      text-align: right;
      text-overflow: ellipsis;
    }

    .input-grid .edit-cell.selected {
      box-shadow: inset 0 0 0 2px #1f6feb;
      background: #a8d4df;
    }

    .input-grid .edit-cell.best-target-option {
      background: #bff0c8;
      color: #053d18;
    }

    .input-grid .edit-cell.best-target-option.selected {
      background: #a7e9b4;
    }

    .input-grid .edit-cell.active {
      box-shadow: inset 0 0 0 2px #050505;
    }

    .input-grid .edit-cell.editing {
      padding: 0;
      cursor: text;
    }

    .input-grid .edit-cell.symbol-cell {
      text-align: left;
    }

    .input-grid .edit-cell.editing.symbol-cell {
      z-index: 20;
      overflow: visible;
    }

    .input-grid input {
      width: 100%;
      height: 26px;
      padding: 2px 5px;
      border: 0;
      outline: none;
      background: transparent;
      color: #050505;
      font: inherit;
      text-align: right;
    }

    .input-grid input.symbol-input {
      text-align: left;
    }

    .symbol-menu {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 30;
      width: max-content;
      min-width: 240px;
      max-width: 420px;
      max-height: 230px;
      overflow: auto;
      border: 1px solid #111;
      background: #f8fbff;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
      color: #050505;
    }

    .symbol-menu button {
      display: block;
      width: 100%;
      min-height: 24px;
      padding: 4px 8px;
      border: 0;
      border-bottom: 1px solid #d8e1ed;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      text-align: left;
      white-space: nowrap;
    }

    .symbol-menu button:hover {
      background: #dcecff;
    }

    .payoff-chart {
      width: 100%;
      height: 240px;
      border: 1px solid #273449;
      border-radius: 6px;
      background: #111923;
    }

    .chain-table .ant-table,
    .legs-table .ant-table {
      background: var(--panel);
      color: var(--text);
    }

    .chain-table.ant-table-wrapper .ant-table-thead > tr > th,
    .legs-table.ant-table-wrapper .ant-table-thead > tr > th {
      padding: 5px 7px !important;
      background: #515b68 !important;
      border-color: #798391 !important;
      color: #fff !important;
      font-size: 11px;
      font-weight: 900;
    }

    .chain-table.ant-table-wrapper .ant-table-tbody > tr > td,
    .legs-table.ant-table-wrapper .ant-table-tbody > tr > td {
      padding: 4px 7px !important;
      background: #1a2433;
      border-color: #303d50;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .chain-table.ant-table-wrapper .ant-table-tbody > tr:nth-child(even) > td,
    .legs-table.ant-table-wrapper .ant-table-tbody > tr:nth-child(even) > td {
      background: #202b3b;
    }

    .sheet-table.ant-table-wrapper .ant-table {
      background: #f2f2f2;
      color: #080808;
      font-family: Arial, Helvetica, sans-serif;
    }

    .sheet-table.ant-table-wrapper .ant-table-thead > tr > th {
      padding: 4px 5px !important;
      background: #366291 !important;
      border: 1px solid #111 !important;
      color: #fff !important;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td {
      height: 24px;
      padding: 2px 5px !important;
      border: 1px solid #222;
      background: #f8f8f8 !important;
      color: #050505 !important;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.05;
      text-align: right;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr:hover > td,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.ant-table-cell-row-hover {
      background: #f8f8f8 !important;
      color: #050505 !important;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-negative,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-negative.ant-table-cell-row-hover {
      background: #f1999c !important;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-warn,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-warn.ant-table-cell-row-hover {
      background: #ffffb3 !important;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-positive,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-positive.ant-table-cell-row-hover {
      background: #c7e7c8 !important;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-zero,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.sim-zero.ant-table-cell-row-hover {
      background: #b8cff0 !important;
    }

    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.result-cell,
    .sheet-table.ant-table-wrapper .ant-table-tbody > tr > td.result-cell.ant-table-cell-row-hover {
      background: #f0f0f0 !important;
    }

    .sheet-table .sheet-type-call {
      background: #ffffb3 !important;
    }

    .sheet-table .sheet-type-put {
      background: #e5c0ef !important;
    }

    .sheet-table .sheet-input {
      background: #b8dfe8 !important;
    }

    .sheet-table .sheet-calc {
      background: #ffffb3 !important;
    }

    .sheet-table .sheet-base-selected {
      display: inline-block;
      padding: 3px 5px;
      background: #050505;
      color: #fff;
      line-height: 1;
    }

    .sheet-table .sim-negative {
      background: #f1999c !important;
    }

    .sheet-table .sim-warn {
      background: #ffffb3 !important;
    }

    .sheet-table .sim-positive {
      background: #c7e7c8 !important;
    }

    .sheet-table .sim-zero {
      background: #b8cff0 !important;
    }

    .sheet-table .result-cell {
      background: #f0f0f0 !important;
      color: #3b6f70 !important;
      font-weight: 900;
    }

    .sheet-table .result-negative {
      color: #ff1010 !important;
    }

    .sheet-table .result-positive {
      color: #3b6f70 !important;
    }

    .target-price-button {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-weight: inherit;
      text-align: right;
    }

    .target-price-button:hover {
      text-decoration: underline;
    }

    .sheet-table .call-side {
      background: #ffffb3 !important;
      text-align: center !important;
    }

    .sheet-table .put-side {
      background: #e5c0ef !important;
      text-align: center !important;
    }

    .sheet-table .acc-side {
      background: #91bd9e !important;
      text-align: center !important;
    }

    .sheet-table .base-side {
      background: #c4c4c4 !important;
    }

    .sheet-table .vi-cell {
      background: #efefef !important;
      color: #355f60 !important;
    }

    .sheet-table .ant-input,
    .sheet-table .ant-input-number,
    .sheet-table .ant-input-number-input,
    .sheet-table .ant-select-selector {
      height: 22px !important;
      min-height: 22px !important;
      background: transparent !important;
      border-color: transparent !important;
      color: #050505 !important;
      font-size: 12px !important;
      font-weight: 900 !important;
      box-shadow: none !important;
    }

    .sheet-title {
      padding: 5px 8px;
      background: #366291;
      border: 2px solid #111;
      color: #fff;
      font-size: 13px;
      font-weight: 950;
      text-align: center;
    }

    .sheet-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 8px;
      background: #366291;
      border: 2px solid #111;
      color: #fff;
      font-size: 13px;
      font-weight: 950;
    }

    .sheet-title-row .sheet-title-text {
      min-width: 160px;
      text-align: center;
    }

    .range-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 800;
    }

    .ant-input,
    .ant-input-number,
    .ant-input-number-input,
    .ant-select-selector {
      background: #101721 !important;
      border-color: #42516a !important;
      color: #eef3f8 !important;
    }

    .ant-input::placeholder { color: #7f8ea2; }
    .ant-empty-description,
    .ant-spin-text { color: var(--muted) !important; }

    @media (max-width: 900px) {
      body { min-width: 900px; }
      .landing { grid-template-columns: 1fr; }
      .strategy-grid { grid-template-columns: 1fr; }
      .spreadsheet-grid { grid-template-columns: 1fr; }
      .history-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/antd@5.21.6/dist/antd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5.4.0/dist/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.7/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;
    const { Button, ConfigProvider, Empty, Form, Input, InputNumber, Popconfirm, Select, Space, Spin, Switch, Table, Tag, Tooltip, message, theme } = antd;
    const { PauseCircleOutlined, PlayCircleOutlined, ReloadOutlined, SaveOutlined, SendOutlined } = icons;

    const UNDERLYINGS = ['GGAL', 'YPFD', 'COME', 'PAMP', 'BMA', 'ALUA', 'SUPV'];
    const DEFAULT_STRATEGY_ROWS_PER_SIDE = 10;
    const HISTORY_ROWS_PER_SIDE = 24;
    const BEST_TARGET_TOLERANCE = 0.05;
    const OPTION_MULTIPLIER = 100;
    const OPTION_FEE_FACTOR = (0.005 + 0.002) * 1.21;
    const MONTHS = [
      { value: 'AG', label: 'Agosto' },
      { value: 'OC', label: 'Octubre' },
      { value: 'DI', label: 'Diciembre' },
      { value: 'FE', label: 'Febrero' },
      { value: 'AB', label: 'Abril' },
      { value: 'JL', label: 'Julio' }
    ];

    function formatNumber(value, digits = 2) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return '-';
      return new Intl.NumberFormat('es-AR', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(numeric);
    }

    function parseNumeric(value) {
      if (value === null || value === undefined || value === '') return null;
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      const raw = String(value).trim();
      if (!raw) return null;
      const hasComma = raw.includes(',');
      const hasDot = raw.includes('.');
      let normalized = raw;
      if (hasComma) normalized = raw.replace(/\./g, '').replace(',', '.');
      else if (hasDot && raw.split('.').length > 2) normalized = raw.replace(/\./g, '');
      const numeric = Number(normalized);
      return Number.isFinite(numeric) ? numeric : null;
    }

    function formatMoney(value) {
      return `$${formatNumber(value, 0)}`;
    }

    function formatPercent(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return '-';
      return `${formatNumber(numeric * 100, 1)}%`;
    }

    function erf(x) {
      const sign = x < 0 ? -1 : 1;
      const absX = Math.abs(x);
      const t = 1 / (1 + 0.3275911 * absX);
      const y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-absX * absX);
      return sign * y;
    }

    function normalCdf(x) {
      return 0.5 * (1 + erf(x / Math.SQRT2));
    }

    function blackScholesPrice({ type, spot, strike, years, volatility, rate }) {
      if (!(spot > 0) || !(strike > 0) || !(years > 0) || !(volatility > 0)) {
        return type === 'PUT' ? Math.max(strike - spot, 0) : Math.max(spot - strike, 0);
      }
      const sqrtT = Math.sqrt(years);
      const d1 = (Math.log(spot / strike) + (rate + (volatility * volatility) / 2) * years) / (volatility * sqrtT);
      const d2 = d1 - volatility * sqrtT;
      const discount = Math.exp(-rate * years);
      return type === 'PUT'
        ? strike * discount * normalCdf(-d2) - spot * normalCdf(-d1)
        : spot * normalCdf(d1) - strike * discount * normalCdf(d2);
    }

    function impliedVolatilityFromPrice({ price, type, spot, strike, years, rate }) {
      if (!(price > 0) || !(spot > 0) || !(strike > 0) || !(years > 0)) return null;
      const intrinsic = type === 'PUT' ? Math.max(strike - spot, 0) : Math.max(spot - strike, 0);
      if (price <= intrinsic + 0.001) return 0.0001;
      let low = 0.0001;
      let high = 5;
      for (let index = 0; index < 70; index += 1) {
        const mid = (low + high) / 2;
        const candidate = blackScholesPrice({ type, spot, strike, years, volatility: mid, rate });
        if (Math.abs(candidate - price) < 0.001) return mid;
        if (candidate > price) high = mid;
        else low = mid;
      }
      return (low + high) / 2;
    }

    function stableNoise(seed) {
      let hash = 2166136261;
      const value = String(seed || '');
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return ((hash >>> 0) / 4294967295) - 0.5;
    }

    function optionPayoff(type, spot, strike) {
      return type === 'PUT' ? Math.max(strike - spot, 0) : Math.max(spot - strike, 0);
    }

    function optionMark(option) {
      return parseNumeric(option?.mark)
        ?? parseNumeric(option?.last)
        ?? parseNumeric(option?.ask)
        ?? parseNumeric(option?.bid)
        ?? 0;
    }

    function theoreticalOptionPrice(option, spot, strategy, simulatedNow = Date.now()) {
      const volatility = Number(option?.impliedVolatility) > 0 && strategy.useAutoIv
        ? Number(option.impliedVolatility)
        : Number(strategy.volatility || 0.4);
      return blackScholesPrice({
        type: option.optionType,
        spot,
        strike: Number(option.strike),
        years: yearsToExpiration(option.expiration || strategy.expiration, simulatedNow),
        volatility,
        rate: Number(strategy.riskFreeRate || 0.125)
      });
    }

    function simulateOptionChain(options, spot, strategy, simulatedNow = Date.now()) {
      if (!(spot > 0)) return options;
      return options.map((option) => {
        const theoreticalPrice = theoreticalOptionPrice(option, spot, strategy, simulatedNow);
        if (!Number.isFinite(theoreticalPrice)) return option;
        const years = yearsToExpiration(option.expiration || strategy.expiration, simulatedNow);
        const strike = Number(option.strike);
        const moneyness = strike > 0 ? Math.abs(spot / strike - 1) : 0;
        const liquiditySpread = Math.min(0.18, 0.015 + moneyness * 0.35);
        const tickKey = Math.floor(Number(simulatedNow) / 3600000);
        const noise = stableNoise(`${option.symbol}-${tickKey}-${Math.round(spot / 10)}`) * liquiditySpread;
        const price = Math.max(0.001, theoreticalPrice * (1 + noise));
        const impliedVolatility = impliedVolatilityFromPrice({
          price,
          type: option.optionType,
          spot,
          strike,
          years,
          rate: Number(strategy.riskFreeRate || 0.125)
        }) ?? option.impliedVolatility;
        return {
          ...option,
          mark: price,
          last: price,
          bid: Math.max(0, price * (1 - liquiditySpread / 2)),
          ask: price * (1 + liquiditySpread / 2),
          impliedVolatility
        };
      });
    }

    function calculateLocalStrategySnapshot({ strategy, options, spot, simulatedNow = Date.now() }) {
      const optionsBySymbol = new Map(options.map((option) => [String(option.symbol || '').toUpperCase(), option]));
      const legsInput = [
        ...(strategy.legs || []),
        ...(strategy.history || []).map((leg) => ({ ...leg, source: 'history' }))
      ].filter((leg) => {
        const quantity = parseNumeric(leg.quantity);
        return quantity !== null && (leg.type === 'ACC' || String(leg.symbol || '').trim());
      });

      const legs = legsInput.map((leg, index) => {
        const type = String(leg.type || 'CALL').toUpperCase();
        const symbol = String(leg.symbol || '').toUpperCase();
        const contract = optionsBySymbol.get(symbol);
        const quantity = parseNumeric(leg.quantity) ?? 0;
        const strike = parseNumeric(leg.strike) ?? parseNumeric(contract?.strike) ?? 0;
        const currentPrice = type === 'ACC' ? spot : optionMark(contract);
        const premium = leg.source === 'history'
          ? parseNumeric(leg.premium) ?? 0
          : parseNumeric(leg.manualPrice) ?? currentPrice ?? parseNumeric(leg.premium) ?? 0;
        const realized = parseNumeric(leg.realized) ?? 0;
        const multiplier = type === 'ACC' ? 1 : OPTION_MULTIPLIER;
        const gross = quantity * premium * -multiplier;
        const netBeforeRealized = type === 'ACC'
          ? gross
          : quantity > 0
          ? quantity * premium * (1 + OPTION_FEE_FACTOR) * -OPTION_MULTIPLIER
          : quantity * premium * (1 - OPTION_FEE_FACTOR) * -OPTION_MULTIPLIER;
        const net = netBeforeRealized + realized;
        const currentValue = currentPrice * quantity * -multiplier;
        const years = yearsToExpiration(contract?.expiration || strategy.expiration, simulatedNow);
        const impliedVolatility = parseNumeric(contract?.impliedVolatility);
        const volatility = strategy.useAutoIv && impliedVolatility
          ? impliedVolatility
          : Number(strategy.volatility || 0.4);
        const theoreticalPrice = type === 'ACC'
          ? spot
          : blackScholesPrice({ type, spot, strike, years, volatility, rate: Number(strategy.riskFreeRate || 0.125) });
        return {
          id: leg.id || `leg-${index + 1}`,
          type,
          quantity,
          source: leg.source || 'strategy',
          symbol,
          strike,
          premium,
          currentPrice,
          gross,
          net,
          currentValue,
          todayResult: net - currentValue,
          contract,
          theoreticalPrice,
          impliedVolatility,
          greeks: { delta: 0, gamma: 0, vega: 0, theta: 0 }
        };
      });

      function finishAt(price) {
        return legs.reduce((sum, leg) => {
          if (leg.type === 'ACC') return sum + leg.net + price * leg.quantity;
          return sum + leg.net + optionPayoff(leg.type, price, leg.strike) * leg.quantity * OPTION_MULTIPLIER;
        }, 0);
      }

      function theoreticalAt(price) {
        return legs.reduce((sum, leg) => {
          if (leg.type === 'ACC') return sum + leg.net + price * leg.quantity;
          const volatility = strategy.useAutoIv && leg.impliedVolatility ? leg.impliedVolatility : Number(strategy.volatility || 0.4);
          const priceAtScenario = blackScholesPrice({
            type: leg.type,
            spot: price,
            strike: leg.strike,
            years: yearsToExpiration(leg.contract?.expiration || strategy.expiration, simulatedNow),
            volatility,
            rate: Number(strategy.riskFreeRate || 0.125)
          });
          return sum + leg.net + priceAtScenario * leg.quantity * OPTION_MULTIPLIER;
        }, 0);
      }

      const strikes = options.map((option) => Number(option.strike)).filter((value) => value > 0);
      const minStrike = Math.min(...strikes, spot);
      const maxStrike = Math.max(...strikes, spot);
      const minScenario = Math.max(0, Math.floor((minStrike * 0.8) / 100) * 100);
      const maxScenario = Math.ceil((maxStrike * 1.2) / 100) * 100;
      const step = Math.max(10, Math.round(((maxScenario - minScenario) / 40) / 10) * 10);
      const scenarios = [];
      for (let price = minScenario; price <= maxScenario; price += step) {
        scenarios.push({ underlyingPrice: price, finish: finishAt(price), theoretical: theoreticalAt(price) });
      }
      const percentScenarios = [];
      for (let percent = -30; percent <= 30; percent += 2) {
        const underlyingPrice = spot * (1 + percent / 100);
        percentScenarios.push({ percent, underlyingPrice, finish: finishAt(underlyingPrice), theoretical: theoreticalAt(underlyingPrice) });
      }
      const summary = legs.reduce((acc, leg) => {
        acc.gross += leg.gross;
        acc.net += leg.net;
        acc.currentValue += leg.currentValue;
        acc.todayResult += leg.todayResult;
        return acc;
      }, { gross: 0, net: 0, currentValue: 0, todayResult: 0, delta: 0, gamma: 0, vega: 0, theta: 0 });
      return { spot, multiplier: OPTION_MULTIPLIER, assumptions: {}, legs, summary, scenarios, percentScenarios };
    }

    function yearsToExpiration(expiration, fromDate = Date.now()) {
      if (!expiration) return 50 / 365;
      const expiry = new Date(`${expiration}T21:00:00.000Z`);
      const fromTime = fromDate instanceof Date ? fromDate.getTime() : Number(fromDate);
      return Math.max(1, Math.ceil((expiry.getTime() - fromTime) / 86400000)) / 365;
    }

    function expirationTime(value) {
      if (!value) return null;
      const time = new Date(`${value}T21:00:00.000Z`).getTime();
      return Number.isFinite(time) ? time : null;
    }

    function nearestExpirationTime(options, fallbackExpiration) {
      const now = Date.now();
      const expirations = [
        ...options.map((option) => expirationTime(option.expiration)),
        expirationTime(fallbackExpiration)
      ].filter((time) => Number.isFinite(time) && time > now);
      return expirations.length ? Math.min(...expirations) : null;
    }

    function getStrategyIdFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'estrategias' && parts[1]) return parts[1];
      if (parts[0] && !['cotizaciones', 'login'].includes(parts[0])) return parts[0];
      return null;
    }

    async function requestJson(url, options) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...(options || {})
      });
      if (res.status === 401) {
        window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
        throw new Error('Login requerido.');
      }
      const json = await res.json();
      if (!res.ok || !json.ok) throw new Error(json.error || 'No se pudo completar la accion.');
      return json.data;
    }

    function makeFixedLegs(existingLegs = []) {
      const byId = new Map(existingLegs.map((leg) => [leg.id, leg]));
      const legacyCalls = existingLegs.filter((leg) => String(leg.type || '').toUpperCase() === 'CALL' && !String(leg.id || '').startsWith('call-'));
      const legacyPuts = existingLegs.filter((leg) => String(leg.type || '').toUpperCase() === 'PUT' && !String(leg.id || '').startsWith('put-'));
      const callCount = Math.max(DEFAULT_STRATEGY_ROWS_PER_SIDE, existingLegs.filter((leg) => String(leg.type || '').toUpperCase() === 'CALL').length);
      const putCount = Math.max(DEFAULT_STRATEGY_ROWS_PER_SIDE, existingLegs.filter((leg) => String(leg.type || '').toUpperCase() === 'PUT').length);
      const calls = Array.from({ length: callCount }, (_item, index) => {
        const id = `call-${index + 1}`;
        const leg = byId.get(id) || legacyCalls.shift() || {};
        return { id, type: 'CALL', quantity: leg.quantity ?? '', symbol: leg.symbol || '', premium: leg.premium ?? '', manualPrice: leg.manualPrice ?? '' };
      });
      const puts = Array.from({ length: putCount }, (_item, index) => {
        const id = `put-${index + 1}`;
        const leg = byId.get(id) || legacyPuts.shift() || {};
        return { id, type: 'PUT', quantity: leg.quantity ?? '', symbol: leg.symbol || '', premium: leg.premium ?? '', manualPrice: leg.manualPrice ?? '' };
      });
      return [...calls, ...puts];
    }

    function makeFixedHistory(existingRows = []) {
      const calls = existingRows.filter((row) => String(row.type || '').toUpperCase() === 'CALL');
      const puts = existingRows.filter((row) => String(row.type || '').toUpperCase() === 'PUT');
      const makeRows = (type, rows) => Array.from({ length: Math.max(HISTORY_ROWS_PER_SIDE, rows.length) }, (_item, index) => {
        const row = rows[index] || {};
        return {
          id: row.id || `history-${type.toLowerCase()}-${index + 1}`,
          date: row.date || '',
          type,
          quantity: row.quantity ?? '',
          symbol: row.symbol || '',
          premium: row.premium ?? '',
          manualPrice: row.manualPrice ?? '',
          realized: row.realized ?? 0
        };
      });
      return [...makeRows('CALL', calls), ...makeRows('PUT', puts)];
    }

    function PayoffChart({ scenarios }) {
      const data = scenarios || [];
      if (!data.length) return <Empty image={Empty.PRESENTED_IMAGE_SIMPLE} description="Sin escenarios" />;
      const width = 560;
      const height = 260;
      const pad = 30;
      const minX = Math.min(...data.map((item) => item.underlyingPrice));
      const maxX = Math.max(...data.map((item) => item.underlyingPrice));
      const yValues = data.flatMap((item) => [item.finish, item.theoretical]).filter((value) => Number.isFinite(Number(value)));
      const minY = Math.min(...yValues, 0);
      const maxY = Math.max(...yValues, 0);
      const xScale = (x) => pad + ((x - minX) / Math.max(1, maxX - minX)) * (width - pad * 2);
      const yScale = (y) => height - pad - ((y - minY) / Math.max(1, maxY - minY)) * (height - pad * 2);
      const pointsFor = (key) => data
        .filter((item) => Number.isFinite(Number(item[key])))
        .map((item) => `${xScale(item.underlyingPrice)},${yScale(Number(item[key]))}`)
        .join(' ');
      const finishPoints = pointsFor('finish');
      const theoreticalPoints = pointsFor('theoretical');
      const zeroY = yScale(0);

      return (
        <svg className="payoff-chart" viewBox={`0 0 ${width} ${height}`} role="img">
          <circle cx={width / 2 - 82} cy={20} r="4" fill="#2f93ff" />
          <text x={width / 2 - 72} y={24} fill="#eef3f8" fontSize="12" fontWeight="700">Rtdo. Finish</text>
          <circle cx={width / 2 + 18} cy={20} r="4" fill="#ff6b6b" />
          <text x={width / 2 + 28} y={24} fill="#eef3f8" fontSize="12" fontWeight="700">Rtdo. Teórico</text>
          <line x1={pad} x2={width - pad} y1={zeroY} y2={zeroY} stroke="#526075" strokeWidth="1" />
          <polyline fill="none" stroke="#2f93ff" strokeWidth="3" points={finishPoints} />
          <polyline fill="none" stroke="#ff6b6b" strokeWidth="3" points={theoreticalPoints} />
          <text x={pad} y={height - 7} fill="#98a7b8" fontSize="10">{formatNumber(minX, 0)}</text>
          <text x={width - pad - 38} y={height - 7} fill="#98a7b8" fontSize="10">{formatNumber(maxX, 0)}</text>
          <text x={pad} y={24} fill="#98a7b8" fontSize="10">{formatMoney(maxY)}</text>
          <text x={pad} y={height - 28} fill="#98a7b8" fontSize="10">{formatMoney(minY)}</text>
        </svg>
      );
    }

    function splitClipboardRows(text) {
      return String(text || '')
        .trim()
        .split(/\r?\n/)
        .map((line) => {
          const separator = line.includes('\t') ? '\t' : line.includes(';') ? ';' : ',';
          return line.split(separator).map((cell) => cell.trim());
        })
        .filter((cells) => cells.some(Boolean));
    }

    function SpreadsheetInputGrid({ rows, getRowType, onUpdate, optionsByType, premiumTitle = 'PRIMA', extraColumnsAfterSymbol = [], extraColumns = [], onCellFocus, focusRequest, targetHighlights = {} }) {
      const columns = [
        { key: 'quantity', title: 'CANT', editable: true },
        { key: 'symbol', title: 'BASE', editable: true },
        ...extraColumnsAfterSymbol.map((column) => ({ ...column, editable: false })),
        { key: 'premium', title: premiumTitle, editable: true },
        ...extraColumns.map((column) => ({ ...column, editable: false }))
      ];
      const [selection, setSelection] = useState({ start: { row: 0, col: 0 }, end: { row: 0, col: 0 } });
      const [editingCell, setEditingCell] = useState(null);
      const draggingRef = useRef(false);
      const wrapRef = useRef(null);
      const editInputRef = useRef(null);
      const gridIdRef = useRef(`grid-${Math.random().toString(36).slice(2)}`);

      useEffect(() => {
        const stopDragging = () => {
          draggingRef.current = false;
        };
        window.addEventListener('mouseup', stopDragging);
        return () => window.removeEventListener('mouseup', stopDragging);
      }, []);

      useEffect(() => {
        if (!editingCell || !editInputRef.current) return;
        editInputRef.current.focus({ preventScroll: true });
        if (editingCell.selectAll) {
          editInputRef.current.select();
        } else {
          const length = editInputRef.current.value.length;
          editInputRef.current.setSelectionRange(length, length);
        }
        if (columns[editingCell.col]?.key === 'symbol' && typeof editInputRef.current.showPicker === 'function') {
          setTimeout(() => {
            try {
              editInputRef.current?.showPicker();
            } catch (_error) {
              // Some browsers only allow showPicker directly inside user gestures.
            }
          }, 0);
        }
      }, [editingCell]);

      function bounds() {
        const start = selection.start || { row: 0, col: 0 };
        const end = selection.end || start;
        return {
          minRow: Math.min(start.row, end.row),
          maxRow: Math.max(start.row, end.row),
          minCol: Math.min(start.col, end.col),
          maxCol: Math.max(start.col, end.col)
        };
      }

      function isSelected(rowIndex, colIndex) {
        const range = bounds();
        return rowIndex >= range.minRow && rowIndex <= range.maxRow && colIndex >= range.minCol && colIndex <= range.maxCol;
      }

      function isActive(rowIndex, colIndex) {
        const start = selection.start || {};
        return start.row === rowIndex && start.col === colIndex;
      }

      function isEditing(rowIndex, colIndex) {
        return editingCell?.row === rowIndex && editingCell?.col === colIndex;
      }

      function selectCell(rowIndex, colIndex) {
        const next = { start: { row: rowIndex, col: colIndex }, end: { row: rowIndex, col: colIndex } };
        setEditingCell(null);
        setSelection(next);
        onCellFocus?.(rowIndex, colIndex);
      }

      function focusGrid() {
        requestAnimationFrame(() => wrapRef.current?.focus({ preventScroll: true }));
      }

      useEffect(() => {
        if (!focusRequest || !rows.length) return;
        const requestedRow = Number(focusRequest.row);
        const requestedCol = Number(focusRequest.col ?? 0);
        if (!Number.isFinite(requestedRow) || !Number.isFinite(requestedCol)) return;
        const next = clampCell(requestedRow, requestedCol);
        setEditingCell(null);
        setSelection({ start: next, end: next });
        onCellFocus?.(next.row, next.col);
        requestAnimationFrame(() => {
          const cell = wrapRef.current?.querySelector(`[data-cell="${next.row}-${next.col}"]`);
          cell?.scrollIntoView({ block: 'center', inline: 'nearest' });
          wrapRef.current?.focus({ preventScroll: true });
        });
      }, [focusRequest?.token]);

      function clampCell(rowIndex, colIndex) {
        return {
          row: Math.max(0, Math.min(rows.length - 1, rowIndex)),
          col: Math.max(0, Math.min(columns.length - 1, colIndex))
        };
      }

      function moveSelection(rowDelta, colDelta) {
        const active = selection.start || { row: 0, col: 0 };
        const next = clampCell(active.row + rowDelta, active.col + colDelta);
        selectCell(next.row, next.col);
        focusGrid();
      }

      function beginEdit(rowIndex, colIndex, replacement = null) {
        const column = columns[colIndex];
        if (!column?.editable) return;
        if (replacement !== null) changeCell(rowIndex, column.key, replacement);
        setSelection({ start: { row: rowIndex, col: colIndex }, end: { row: rowIndex, col: colIndex } });
        setEditingCell({ row: rowIndex, col: colIndex, selectAll: replacement === null });
        onCellFocus?.(rowIndex, colIndex);
      }

      function stopEdit({ focusBack = true } = {}) {
        setEditingCell(null);
        if (focusBack) focusGrid();
      }

      function copySelection(event) {
        if (editingCell) return;
        const range = bounds();
        const selectedRows = [];
        for (let rowIndex = range.minRow; rowIndex <= range.maxRow; rowIndex += 1) {
          selectedRows.push(columns
            .slice(range.minCol, range.maxCol + 1)
            .map((column) => rows[rowIndex]?.[column.key] ?? '')
            .join('\t'));
        }
        event.preventDefault();
        event.clipboardData.setData('text/plain', selectedRows.join('\n'));
      }

      function normalizePastedCells(cells) {
        const first = String(cells[0] || '').toUpperCase();
        if (['CALL', 'PUT'].includes(first)) return cells.slice(1, 4);
        if (cells.length > 3 && ['CALL', 'PUT'].includes(String(cells[1] || '').toUpperCase())) return cells.slice(2, 5);
        return cells;
      }

      function pasteSelection(event) {
        if (editingCell) return;
        const rowsToPaste = splitClipboardRows(event.clipboardData?.getData('text/plain'));
        if (!rowsToPaste.length) return;
        event.preventDefault();
        const start = selection.start || { row: 0, col: 0 };

        rowsToPaste.forEach((rawCells, pasteRowIndex) => {
          const targetRowIndex = start.row + pasteRowIndex;
          if (targetRowIndex >= rows.length) return;
          const cells = normalizePastedCells(rawCells);
          cells.forEach((cellValue, pasteColIndex) => {
            const targetColIndex = start.col + pasteColIndex;
            const column = columns[targetColIndex];
            if (!column?.editable) return;
            const patch = { [column.key]: column.key === 'symbol' ? String(cellValue || '').toUpperCase() : cellValue };
            onUpdate(targetRowIndex, patch);
          });
        });
      }

      function changeCell(rowIndex, columnKey, value) {
        if (!columns.find((column) => column.key === columnKey)?.editable) return;
        const patch = { [columnKey]: columnKey === 'symbol' ? String(value || '').toUpperCase() : value };
        const type = getRowType(rows[rowIndex]);
        if (columnKey === 'symbol') {
          const selected = (optionsByType[type] || []).find((option) => option.value === patch.symbol);
          if (selected?.option) patch.premium = selected.option.last || selected.option.ask || rows[rowIndex].premium;
        }
        onUpdate(rowIndex, patch);
      }

      function renderCellContent(row, rowIndex, column, colIndex, highlight) {
        if (column.render) return column.render(row[column.key], row, rowIndex, colIndex);
        if (highlight) {
          return (
            <Tooltip title={highlight.title} mouseEnterDelay={0} mouseLeaveDelay={0}>
              <span>{row[column.key] ?? ''}</span>
            </Tooltip>
          );
        }
        return <span>{row[column.key] ?? ''}</span>;
      }

      function pickSymbol(rowIndex, symbol) {
        changeCell(rowIndex, 'symbol', symbol);
        stopEdit();
      }

      function handleGridKeyDown(event) {
        if (editingCell) return;
        const active = selection.start || { row: 0, col: 0 };
        if ((event.metaKey || event.ctrlKey) && ['c', 'v', 'x', 'a'].includes(event.key.toLowerCase())) {
          if (event.key.toLowerCase() === 'a') {
            event.preventDefault();
            setSelection({
              start: { row: 0, col: 0 },
              end: { row: rows.length - 1, col: columns.length - 1 }
            });
          }
          return;
        }

        if (event.key === 'ArrowRight') {
          event.preventDefault();
          moveSelection(0, 1);
        } else if (event.key === 'ArrowLeft') {
          event.preventDefault();
          moveSelection(0, -1);
        } else if (event.key === 'ArrowDown') {
          event.preventDefault();
          moveSelection(1, 0);
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          moveSelection(-1, 0);
        } else if (event.key === 'Tab') {
          event.preventDefault();
          moveSelection(0, event.shiftKey ? -1 : 1);
        } else if (event.key === 'Enter') {
          event.preventDefault();
          beginEdit(active.row, active.col);
        } else if (event.key === 'Backspace' || event.key === 'Delete') {
          event.preventDefault();
          const range = bounds();
          for (let rowIndex = range.minRow; rowIndex <= range.maxRow; rowIndex += 1) {
            for (let colIndex = range.minCol; colIndex <= range.maxCol; colIndex += 1) {
              if (!columns[colIndex]?.editable) continue;
              onUpdate(rowIndex, { [columns[colIndex].key]: '' });
            }
          }
        } else if (event.key.length === 1 && !event.altKey && !event.metaKey && !event.ctrlKey) {
          event.preventDefault();
          const column = columns[active.col];
          if (!column?.editable) return;
          const nextValue = column.key === 'symbol' ? event.key.toUpperCase() : event.key;
          beginEdit(active.row, active.col, nextValue);
        }
      }

      function handleInputKeyDown(event, rowIndex, colIndex) {
        if (event.key === 'Escape') {
          event.preventDefault();
          stopEdit();
        } else if (event.key === 'Enter') {
          event.preventDefault();
          stopEdit({ focusBack: false });
          moveSelection(1, 0);
        } else if (event.key === 'Tab') {
          event.preventDefault();
          stopEdit({ focusBack: false });
          moveSelection(0, event.shiftKey ? -1 : 1);
        }
      }

      return (
        <div
          ref={wrapRef}
          className="input-grid-wrap"
          tabIndex={0}
          onCopy={copySelection}
          onPaste={pasteSelection}
          onKeyDown={handleGridKeyDown}
        >
          <datalist id={`${gridIdRef.current}-CALL`}>
            {(optionsByType.CALL || []).map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}
          </datalist>
          <datalist id={`${gridIdRef.current}-PUT`}>
            {(optionsByType.PUT || []).map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}
          </datalist>
          <table className="input-grid">
            <thead>
              <tr>
                <th style={{ width: 64 }}>TIPO</th>
                {columns.map((column) => <th key={column.key}>{column.title}</th>)}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, rowIndex) => {
                const type = getRowType(row);
                return (
                  <tr key={row.id || `${type}-${rowIndex}`} className={type === 'PUT' ? 'type-put' : 'type-call'}>
                    <td className="type-cell">{type}</td>
                    {columns.map((column, colIndex) => {
                      const highlight = column.key === 'symbol'
                        ? targetHighlights[String(row.symbol || '').toUpperCase()]
                        : null;
                      return (
                        <td
                          key={column.key}
                          data-cell={`${rowIndex}-${colIndex}`}
                          className={`edit-cell ${column.key === 'symbol' ? 'symbol-cell' : ''} ${highlight ? 'best-target-option' : ''} ${isSelected(rowIndex, colIndex) ? 'selected' : ''} ${isActive(rowIndex, colIndex) ? 'active' : ''} ${isEditing(rowIndex, colIndex) ? 'editing' : ''}`}
                          onMouseDown={(event) => {
                            event.preventDefault();
                            draggingRef.current = true;
                            selectCell(rowIndex, colIndex);
                            focusGrid();
                          }}
                          onMouseUp={() => {
                            draggingRef.current = false;
                          }}
                          onDoubleClick={() => beginEdit(rowIndex, colIndex)}
                          onMouseEnter={(event) => {
                            if (draggingRef.current && event.buttons === 1) {
                              setSelection((current) => ({ ...current, end: { row: rowIndex, col: colIndex } }));
                            }
                          }}
                        >
                          {isEditing(rowIndex, colIndex) ? (
                            <>
                              <input
                                ref={editInputRef}
                                className={column.key === 'symbol' ? 'symbol-input' : ''}
                                value={row[column.key] ?? ''}
                                list={column.key === 'symbol' ? `${gridIdRef.current}-${type}` : undefined}
                                onChange={(event) => changeCell(rowIndex, column.key, event.target.value)}
                                onKeyDown={(event) => handleInputKeyDown(event, rowIndex, colIndex)}
                                onBlur={() => stopEdit({ focusBack: false })}
                              />
                              {column.key === 'symbol' ? (
                                <div className="symbol-menu" onMouseDown={(event) => event.preventDefault()}>
                                  {(optionsByType[type] || []).map((item) => (
                                    <button key={item.value} type="button" onClick={() => pickSymbol(rowIndex, item.value)}>
                                      {item.label}
                                    </button>
                                  ))}
                                </div>
                              ) : null}
                            </>
                          ) : (
                            renderCellContent(row, rowIndex, column, colIndex, highlight)
                          )}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }
