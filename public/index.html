<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IOL Market Data Lab</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; max-width: 960px; margin: 32px auto; padding: 0 16px; }
    input, button { font-size: 16px; padding: 8px 10px; }
    pre { background: #111; color: #eee; padding: 16px; overflow: auto; border-radius: 8px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>IOL Market Data Lab</h1>
  <p>Probá un símbolo y mirá la respuesta cruda de IOL.</p>

  <div class="row">
    <input id="market" value="BCBA" placeholder="Mercado" />
    <input id="symbol" value="GGAL" placeholder="Ticker / símbolo" />
    <button id="btn">Consultar</button>
  </div>

  <pre id="out">Esperando consulta...</pre>

  <script>
    const out = document.getElementById('out');
    const btn = document.getElementById('btn');

    btn.addEventListener('click', async () => {
      const market = document.getElementById('market').value.trim() || 'BCBA';
      const symbol = document.getElementById('symbol').value.trim();

      out.textContent = 'Consultando...';

      try {
        const res = await fetch(`/api/quote?market=${encodeURIComponent(market)}&symbol=${encodeURIComponent(symbol)}`);
        const json = await res.json();
        out.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        out.textContent = String(err.stack || err);
      }
    });
  </script>
</body>
</html>
