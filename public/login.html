<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Login - Planilla Sabro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.21.6/dist/reset.css" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #101721;
      --panel: #172131;
      --line: #334259;
      --text: #eef3f8;
      --muted: #98a7b8;
      --blue: #2f93ff;
      --red: #ff4d4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #151f2d 0, #0f1620 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .login {
      width: min(420px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 900;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      outline: none;
      background: #0f1620;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(47, 147, 255, 0.18);
    }

    button {
      width: 100%;
      height: 42px;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .error {
      min-height: 20px;
      margin-top: 12px;
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="login">
    <h1>Planilla Sabro</h1>
    <p>Acceso privado</p>
    <form id="login-form">
      <label for="username">Usuario</label>
      <input id="username" name="username" autocomplete="username" autofocus />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" />
      <button id="submit" type="submit">Entrar</button>
      <div id="error" class="error"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const submit = document.getElementById('submit');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.textContent = '';
      submit.disabled = true;
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value,
            password: form.password.value
          })
        });
        const json = await response.json();
        if (!response.ok || !json.ok) throw new Error(json.error || 'No se pudo iniciar sesion.');
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('next') || '/';
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
