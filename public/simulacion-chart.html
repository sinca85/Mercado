<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Grafico de Simulacion</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1620;
      --panel: #151f2d;
      --line: #2d3a50;
      --text: #eef3f8;
      --muted: #91a0b2;
      --blue: #2f93ff;
      --green: #20c65a;
      --red: #ff4d4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #182232;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 900;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pill {
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #101824;
      color: var(--text);
    }

    .chart-wrap {
      position: relative;
      height: calc(100vh - 58px);
      padding: 12px;
    }

    #chart {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .drawing-toolbar {
      position: absolute;
      z-index: 4;
      top: 22px;
      left: 22px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 24, 36, 0.94);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
    }

    .tool-button {
      height: 28px;
      min-width: 30px;
      padding: 0 9px;
      border: 1px solid #34445d;
      border-radius: 6px;
      background: #172131;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .tool-button:hover,
    .tool-button.active {
      border-color: var(--blue);
      background: #20385a;
      color: #fff;
    }

    .tool-button.danger:hover {
      border-color: var(--red);
      background: rgba(255, 77, 79, 0.18);
    }

    .drawing-layer {
      position: absolute;
      z-index: 3;
      inset: 13px;
      border-radius: 8px;
      pointer-events: none;
    }

    .drawing-layer.drawing-enabled {
      cursor: crosshair;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0);
    }

    .drawn-line {
      stroke: #f2dd22;
      stroke-width: 2.2;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55));
    }

    .drawn-line.preview {
      stroke: var(--blue);
      stroke-dasharray: 6 5;
    }

    .empty {
      position: fixed;
      inset: 58px 0 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1 id="title">Grafico de simulacion</h1>
      <div id="subtitle" class="subtitle">Esperando simulacion...</div>
    </div>
    <div class="status">
      <span id="mode" class="pill">-</span>
      <span id="step" class="pill">0/0</span>
      <span id="last" class="pill">Sin datos</span>
    </div>
  </header>
  <main class="chart-wrap">
    <div class="drawing-toolbar" aria-label="Herramientas de dibujo">
      <button class="tool-button active" data-tool="cursor" title="Cursor">Cursor</button>
      <button class="tool-button" data-tool="trend" title="Linea de dos puntos">Linea</button>
      <button class="tool-button" data-tool="horizontal" title="Linea horizontal">H</button>
      <button class="tool-button" id="undoDrawing" title="Deshacer">Undo</button>
      <button class="tool-button danger" id="clearDrawings" title="Borrar dibujos">Borrar</button>
    </div>
    <div id="chart"></div>
    <svg id="drawingLayer" class="drawing-layer"></svg>
  </main>
  <div id="empty" class="empty">Inicia una simulacion desde la planilla para ver el grafico sincronizado.</div>

  <script>
    const strategyId = decodeURIComponent(location.pathname.split('/').filter(Boolean)[1] || 'current');
    const storageKey = `sabro:simulation-chart:${strategyId}`;
    const chartEl = document.getElementById('chart');
    const drawingLayer = document.getElementById('drawingLayer');
    const emptyEl = document.getElementById('empty');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const modeEl = document.getElementById('mode');
    const stepEl = document.getElementById('step');
    const lastEl = document.getElementById('last');
    const drawingsKey = `sabro:simulation-chart-drawings:${strategyId}`;
    let drawingTool = 'cursor';
    let drawings = readDrawings();
    let drawingStart = null;
    let previewLine = null;
    let didFitInitialContent = false;

    const chart = LightweightCharts.createChart(chartEl, {
      autoSize: true,
      layout: {
        background: { color: '#151f2d' },
        textColor: '#d8e1ec'
      },
      grid: {
        vertLines: { color: '#223049' },
        horzLines: { color: '#223049' }
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal
      },
      timeScale: {
        borderColor: '#334259',
        timeVisible: true,
        secondsVisible: false
      },
      rightPriceScale: {
        borderColor: '#334259'
      }
    });

    const series = chart.addCandlestickSeries({
      upColor: '#20c65a',
      downColor: '#ff4d4f',
      borderUpColor: '#20c65a',
      borderDownColor: '#ff4d4f',
      wickUpColor: '#20c65a',
      wickDownColor: '#ff4d4f',
      priceFormat: {
        type: 'price',
        precision: 2,
        minMove: 0.01
      }
    });

    function formatNumber(value) {
      return new Intl.NumberFormat('es-AR', { maximumFractionDigits: 2 }).format(Number(value || 0));
    }

    function readDrawings() {
      try {
        const raw = localStorage.getItem(drawingsKey);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (_error) {
        return [];
      }
    }

    function saveDrawings() {
      try {
        localStorage.setItem(drawingsKey, JSON.stringify(drawings));
      } catch (_error) {}
    }

    function syncDrawingLayerSize() {
      const rect = drawingLayer.getBoundingClientRect();
      drawingLayer.setAttribute('width', Math.max(1, Math.round(rect.width)));
      drawingLayer.setAttribute('height', Math.max(1, Math.round(rect.height)));
      drawingLayer.setAttribute('viewBox', `0 0 ${Math.max(1, Math.round(rect.width))} ${Math.max(1, Math.round(rect.height))}`);
    }

    function pointFromEvent(event) {
      const rect = drawingLayer.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
        y: Math.max(0, Math.min(rect.height, event.clientY - rect.top))
      };
    }

    function lineElement(line, extraClass = '') {
      const element = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      element.setAttribute('x1', line.x1);
      element.setAttribute('y1', line.y1);
      element.setAttribute('x2', line.x2);
      element.setAttribute('y2', line.y2);
      element.setAttribute('class', `drawn-line ${extraClass}`.trim());
      return element;
    }

    function makeLineFromPoints(start, end) {
      return {
        type: drawingTool,
        x1: Number(start.x.toFixed(1)),
        y1: Number(start.y.toFixed(1)),
        x2: Number(end.x.toFixed(1)),
        y2: Number((drawingTool === 'horizontal' ? start.y : end.y).toFixed(1))
      };
    }

    function clearPreviewLine() {
      if (previewLine) previewLine.remove();
      previewLine = null;
      drawingStart = null;
    }

    function renderDrawings() {
      drawingLayer.innerHTML = '';
      const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hitArea.setAttribute('x', 0);
      hitArea.setAttribute('y', 0);
      hitArea.setAttribute('width', '100%');
      hitArea.setAttribute('height', '100%');
      hitArea.setAttribute('fill', 'transparent');
      hitArea.setAttribute('pointer-events', 'all');
      drawingLayer.appendChild(hitArea);
      for (const drawing of drawings) {
        drawingLayer.appendChild(lineElement(drawing));
      }
    }

    function setDrawingTool(tool) {
      clearPreviewLine();
      drawingTool = tool;
      drawingLayer.classList.toggle('drawing-enabled', drawingTool !== 'cursor');
      document.querySelectorAll('[data-tool]').forEach((button) => {
        button.classList.toggle('active', button.dataset.tool === tool);
      });
    }

    document.querySelectorAll('[data-tool]').forEach((button) => {
      button.addEventListener('click', () => setDrawingTool(button.dataset.tool));
    });

    document.getElementById('undoDrawing').addEventListener('click', () => {
      drawings.pop();
      saveDrawings();
      renderDrawings();
    });

    document.getElementById('clearDrawings').addEventListener('click', () => {
      drawings = [];
      saveDrawings();
      renderDrawings();
    });

    drawingLayer.addEventListener('pointerdown', (event) => {
      if (drawingTool === 'cursor') return;
      event.preventDefault();
      const point = pointFromEvent(event);
      if (!drawingStart) {
        drawingStart = point;
        previewLine = lineElement(makeLineFromPoints(drawingStart, point), 'preview');
        drawingLayer.appendChild(previewLine);
        return;
      }

      const line = makeLineFromPoints(drawingStart, point);
      clearPreviewLine();
      if (Math.abs(line.x2 - line.x1) > 4 || Math.abs(line.y2 - line.y1) > 4) {
        drawings.push(line);
        saveDrawings();
        renderDrawings();
      }
    });

    drawingLayer.addEventListener('pointermove', (event) => {
      if (!drawingStart || !previewLine) return;
      event.preventDefault();
      const point = pointFromEvent(event);
      const endY = drawingTool === 'horizontal' ? drawingStart.y : point.y;
      previewLine.setAttribute('x2', point.x);
      previewLine.setAttribute('y2', endY);
    });

    drawingLayer.addEventListener('pointerup', (event) => {
      if (drawingTool !== 'cursor') event.preventDefault();
    });

    drawingLayer.addEventListener('pointercancel', () => {
      clearPreviewLine();
    });

    function barsForState(state) {
      const historicalBars = Array.isArray(state?.historicalBars) ? state.historicalBars : [];
      const simulationBars = Array.isArray(state?.simulationBars) ? state.simulationBars : [];
      const step = Math.max(0, Number(state?.step || 0));
      return [
        ...historicalBars,
        ...simulationBars.slice(0, step)
      ].filter((bar) => bar && bar.time && Number(bar.close) > 0);
    }

    function render(state) {
      const bars = barsForState(state);
      emptyEl.style.display = bars.length ? 'none' : 'grid';
      titleEl.textContent = state?.strategyName
        ? `${state.underlying || ''} - ${state.strategyName}`
        : `Grafico ${state?.underlying || strategyId}`;
      subtitleEl.textContent = bars.length
        ? 'Historico reescalado al spot actual + barras simuladas sincronizadas'
        : 'Esperando simulacion...';
      modeEl.textContent = state?.mode === 'historical' ? 'Historico' : 'Aleatorio';
      stepEl.textContent = `${Number(state?.step || 0)}/${Number(state?.totalSteps || 0)}`;
      const last = bars[bars.length - 1];
      lastEl.textContent = last ? `Ult ${formatNumber(last.close)}` : 'Sin datos';
      const rangeLabel = state?.historicalRange?.fechaDesde && state?.historicalRange?.fechaHasta
        ? ` | rango ${state.historicalRange.fechaDesde} a ${state.historicalRange.fechaHasta}`
        : '';
      if (bars.length) subtitleEl.textContent += rangeLabel;
      series.setData(bars);
      if (bars.length && !didFitInitialContent) {
        chart.timeScale().fitContent();
        didFitInitialContent = true;
      }
    }

    function readStoredState() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch (_error) {
        return null;
      }
    }

    render(readStoredState());
    syncDrawingLayerSize();
    renderDrawings();
    new ResizeObserver(() => {
      syncDrawingLayerSize();
      renderDrawings();
    }).observe(drawingLayer);

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('sabro-simulation-chart');
      channel.addEventListener('message', (event) => {
        if (event.data?.type !== 'simulation-chart:update') return;
        if (String(event.data.strategyId || 'current') !== strategyId) return;
        render(event.data.state);
      });
    }

    window.addEventListener('storage', (event) => {
      if (event.key !== storageKey || !event.newValue) return;
      try {
        render(JSON.parse(event.newValue));
      } catch (_error) {
        render(null);
      }
    });
  </script>
</body>
</html>
